# Render Blueprint: create service from repo with Blueprint
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: prompt-reverse-engine
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # Fill in Render dashboard (do not commit secrets)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://qianfan.baidubce.com/v2/coding
      - key: VISION_MODEL
        value: minimax-m2.5
      # Render injects PORT automatically; server reads process.env.PORT
